<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мухаммед-Кали & Балауса</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  text-align: center;
  color: white;
  background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center/cover;
}

.overlay {
  background: rgba(0,0,0,0.5);
  min-height: 100vh;
  padding: 20px;
}

.box {
  background: white;
  color: black;
  padding: 20px;
  margin: 20px;
  border-radius: 15px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

iframe {
  width: 100%;
  height: 250px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>Мухаммед-Кали & Балауса</h1>
<p>28 маусым 2026</p>

<!-- МУЗЫКА -->
<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<button onclick="playMusic()">🎵 Музыканы қосу</button>

<!-- КАРТА -->
<div class="box">
<h2>Той орны</h2>
<p>Саудакент "Ақ Отау"</p>

<iframe src="https://maps.google.com/maps?q=Saudakent&output=embed"></iframe>
</div>

<!-- КЕЛЕМІН -->
<div class="box">
<h2>Қатысу</h2>

<input type="text" id="name" placeholder="Атыңыз"><br><br>

<button onclick="send()">Келемін</button>

<p id="msg"></p>
</div>

</div>

<script>
function playMusic(){
document.getElementById("music").play();
}

function send(){
let name = document.getElementById("name").value;

if(name==""){
alert("Атыңызды жазыңыз");
return;
}

document.getElementById("msg").innerText = "Рахмет, " + name + "!";
}
</script>

</body>
</html>
