<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тойға шақыру</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
  /* Плавный пайда болу */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 20px;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { 
    opacity: 0; 
    transform: translateY(20px);
  }
  to { 
    opacity: 1; 
    transform: translateY(0);
  }
}
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: white;
  text-align: center;
  background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') no-repeat center/cover;
}

.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  margin: 20px auto;
  border-radius: 20px;
  max-width: 400px;
  backdrop-filter: blur(10px);
}

/* ❤️ ЖҮРЕК АНИМАЦИЯ */
.heart {
  color: red;
  animation: beat 1s infinite;
}
@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 90%;
  font-size: 16px;
  cursor: pointer;
}

.yes { background: #4CAF50; color: white; }
.couple { background: #2196F3; color: white; }
.no { background: #f44336; color: white; }

iframe {
  border-radius: 15px;
  width: 100%;
  height: 250px;
  border: none;
}

.music-btn {
  padding:10px;
  border-radius:10px;
  border:none;
  background:#fff;
  color:#000;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>Мұхаммед-Қали <span class="heart">❤️</span> Балауса</h1>

<div class="card">
<p>Сіз(дер)ді біздің қуанышымызға ортақтасуға шақырамыз!</p>

<p><b>Күні:</b> 28.06.2026</p>
<p><b>Уақыты:</b> 19:00</p>

<p>📅 28 <span class="heart">❤️</span> 2026</p>

<!-- ⏳ ТАЙМЕР -->
<p id="countdown"></p>

<p><b>Мекенжай:</b><br>
Саудакент ауылы<br>
"Ақ Отау" мейрамханасы</p>

<p><b>Той иелері:</b><br>
Мейраш<br>
Баяхметовтар әулеті</p>
</div>

<div class="card">
<h3>Қатысуыңызды белгілеңіз:</h3>

<button class="button yes">Ия, барамын</button>
<button class="button couple">Ия, жұбайыммен барамын</button>
<button class="button no">Өкінішке орай бара алмаймын</button>

</div>

<div class="card">
<h3>Местоположение:</h3>
<iframe src="https://www.google.com/maps?q=Саудакент Ақ Отау&output=embed"></iframe>
</div>

<!-- 🎵 МУЗЫКА -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b8b9d6c02.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="playMusic()">🎵 Музыканы қосу</button>

</div>

<script>
// ⏳ Таймер
const weddingDate = new Date("June 28, 2026 19:00:00").getTime();

setInterval(function() {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);

  document.getElementById("countdown").innerText =
    "Тойға дейін: " + days + " күн " + hours + " сағат";

}, 1000);

// 🎵 Музыка
function playMusic() {
  document.getElementById("music").play();
}

// 📲 WhatsApp жауап
const buttons = document.querySelectorAll(".button");

buttons.forEach(btn => {
  btn.addEventListener("click", () => {

    let text = btn.innerText;

    window.open("https://wa.me/+77713668867?text=" + 
    encodeURIComponent("Тойға жауап: " + text));

  });
});
</script>

</body>
</html>
