<!DOCTYPE html><html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тойға шақыру</title><style>
body {
    margin: 0;
    font-family: sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
}

.container {
    padding: 30px;
}

.card {
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 20px;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #ff4d6d;
    font-size: 16px;
    cursor: pointer;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    width: 80%;
}
</style></head><body><div class="container">
    <h1>💍 Мұхаммедқали & Балауса 💍</h1><!-- Музыка -->
<iframe width="100%" height="200"
src="https://www.youtube.com/embed?listType=search&list=Ильхан Вальс"
frameborder="0" allowfullscreen
style="border-radius:15px;">
</iframe>

<!-- Шақырту -->
<div class="card">
    <p>Құрметті қонақтарымыз!</p>

    <p>Сіздерді үйлену тойымызға шын жүректен шақырамыз ❤️</p>

    <h3>📅 28 маусым 2026</h3>
    <h3>🕕 18:00</h3>
</div>

<!-- Мекенжай -->
<div class="card">
    <h3>📍 Той орны</h3>
    <p>Саудакент, "Ақ Отау"</p>

    <iframe 
    src="https://www.google.com/maps?q=Саудакент&output=embed"
    width="100%" height="250"
    style="border:0; border-radius:15px;">
    </iframe>
</div>

<!-- Қатысу -->
<div class="card">
    <h3>Қатысу</h3>
    <input id="name" placeholder="Атыңыз"><br><br>

    <button onclick="send()">Келемін</button>
</div>

</div><script>
function send() {
    const name = document.getElementById("name").value;
    const phone = "77000000000"; // ӨЗ НОМЕРІҢ

    const text = `Сәлем! Мен ${name} тойға келемін ❤️`;

    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);
}
</script></body>
</html>
